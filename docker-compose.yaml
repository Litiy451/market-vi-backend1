services:
  postgres:
    image: postgres:16
    container_name: market-vi-postgres
    environment:
      POSTGRES_DB: market-vi-db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - market-vi-pgdata:/var/lib/postgresql/data

volumes:
  market-vi-pgdata:
