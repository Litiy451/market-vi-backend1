spring.application.name=market-vi-backend1
spring.datasource.url=jdbc:postgresql://localhost:5432/market-vi-db
spring.datasource.username=admin
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
server.port=8083
spring.jpa.properties.hibernate.default_schema=public
app.jwt.secret=CHANGE_ME_TO_LONG_RANDOM_SECRET_64+chars_min
app.jwt.accessMinutes=15
app.jwt.refreshDays=14
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true